name: Pages Deploy
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: deploy
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Process
        env:
          A7ED98: ${{ secrets.A7ED98 }}
          B46F9F: ${{ secrets.B46F9F }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('A7ED98', '')
          bm = os.environ.get('B46F9F', '')
          p = pathlib.Path('index.html')
          s = s2 = p.read_text(encoding='utf-8')
          if gm:
              s2 = s2.replace('<!-- 97f6046710a7e256b1 -->', gm)
          if bm:
              s2 = s2.replace('<!-- c880028fae138a4e437249d24dbf5b9bf8 -->', bm)
          if s2 == s and (gm or bm):
              sys.exit(1)
          if s2 != s:
              p.write_text(s2, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
